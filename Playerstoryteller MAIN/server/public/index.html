<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RimWorld Player Storyteller</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app">
        <header>
            <h1>🎮 RimWorld Player Storyteller</h1>
            <div id="connection-status" class="status disconnected">
                <span class="status-dot"></span>
                <span class="status-text">Disconnected</span>
            </div>
        </header>

        <!-- Session Selection Screen -->
        <div id="session-selection" class="screen active">
            <div class="container">
                <h2>Select a Game Session</h2>
                <div id="sessions-list" class="sessions-grid">
                    <div class="no-sessions">
                        <p>No active game sessions found</p>
                        <p class="hint">Start RimWorld with the Player Storyteller mod to begin</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Game Viewer Screen -->
        <div id="game-viewer" class="screen">
            <div class="viewer-header">
                <button id="back-button" class="btn-back">← Back to Sessions</button>
                <div class="session-info">
                    <h2 id="current-session-name">Loading...</h2>
                    <div class="session-stats">
                        <span id="colonist-count">0 colonists</span>
                        <span id="wealth">Wealth: $0</span>
                        <span id="viewer-count">0 viewers</span>
                    </div>
                </div>
            </div>

            <div class="viewer-content">
                <!-- Screenshot Display -->
                <div class="screenshot-container">
                    <img id="game-screenshot" src="" alt="Game Screenshot" />
                    <div class="screenshot-overlay">
                        <div id="last-update">Waiting for update...</div>
                    </div>
                </div>

                <!-- Colonists Panel -->
                <div class="colonists-panel">
                    <h3>Colonists</h3>
                    <div id="colonists-list" class="colonists-list">
                        <p class="loading">Loading colonist data...</p>
                    </div>
                </div>
            </div>

            <!-- Action Panel -->
            <div class="action-panel">
                <h3>Storyteller Actions</h3>
                <div class="actions-grid">
                    <button class="action-btn" data-action="raid">Send Raid</button>
                    <button class="action-btn" data-action="resource">Send Resources</button>
                    <button class="action-btn" data-action="event">Random Event</button>
                    <button class="action-btn" data-action="weather">Change Weather</button>
                </div>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="app.js"></script>
</body>
</html>
